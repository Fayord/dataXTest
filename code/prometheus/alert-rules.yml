groups:
  - name: agent-api-alerts
    rules:
      # --- Availability ---
      - alert: AgentAPIDown
        expr: up{job="agent-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Agent API is down"
          description: "The agent API has been unreachable for more than 1 minute."

      # --- Rejection rate alerts ---
      # Baseline rejection rate is ~15% (REJECTION_MIX_RATIO=0.15 in traffic-generator).
      # Threshold of 25% gives headroom above normal variance while catching
      # real problems (e.g., overly aggressive prompt filter changes).
      # Uses a 5m window to smooth out short bursts.
      - alert: HighRejectionRate
        expr: |
          (
            sum(rate(agent_rejections_total[5m]))
            /
            sum(rate(agent_requests_total{route="/ask"}[5m]))
          ) > 0.25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rejection rate: {{ $value | humanizePercentage }}"
          description: >-
            Rejection rate has been above 25% for 5 minutes
            (current: {{ $value | humanizePercentage }}).
            Baseline is ~15%. Check if rejection patterns were changed
            or if legitimate traffic is being incorrectly rejected.

      # Detects sudden spikes by comparing the current 5m rejection rate
      # against the 30m baseline. A 2x increase from baseline indicates
      # something changed (new deployment, attack, config drift).
      - alert: RejectionRateSpike
        expr: |
          (
            sum(rate(agent_rejections_total[5m]))
            /
            sum(rate(agent_requests_total{route="/ask"}[5m]))
          )
          >
          2 * (
            sum(rate(agent_rejections_total[30m]))
            /
            sum(rate(agent_requests_total{route="/ask"}[30m]))
          )
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Rejection rate spike detected: {{ $value | humanizePercentage }}"
          description: >-
            Current 5m rejection rate is more than 2x the 30m baseline.
            This may indicate a sudden change in traffic patterns,
            a new prompt version with stricter filtering,
            or an ongoing attack. Check agent_rejections_total by reason label.

      # --- Latency ---
      # p95 latency above 1s sustained for 5m indicates performance degradation.
      # Normal latency for this app is sub-100ms (simple regex + response generation).
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(agent_request_latency_seconds_bucket{route="/ask"}[5m])) by (le))
          > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency: {{ $value | humanizeDuration }}"
          description: >-
            p95 request latency has been above 1s for 5 minutes.
            Normal is sub-100ms. Check for resource contention,
            increased traffic, or application-level issues.

      # --- Per-reason rejection alerts ---
      # A spike in a specific rejection reason helps narrow down root cause.
      # Prompt injection spikes may indicate an active attack.
      - alert: PromptInjectionSpike
        expr: |
          rate(agent_rejections_total{reason="prompt_injection"}[5m]) > 0.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Prompt injection attempts spiking: {{ $value | humanize }} req/s"
          description: >-
            Prompt injection rejection rate is above 0.5/s for 3 minutes.
            This may indicate an active attack or automated probing.
            Review traffic-generator config and application logs.
